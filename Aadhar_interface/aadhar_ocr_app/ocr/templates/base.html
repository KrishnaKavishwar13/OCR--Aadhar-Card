<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DocuLens AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --surface-color: rgba(20, 20, 22, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --success-color: #10b981;
            --danger-color: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Dynamic Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }
        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: rgba(99, 102, 241, 0.4);
            top: -200px; left: -100px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: rgba(168, 85, 247, 0.4);
            bottom: -100px; right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Typography */
        h1, h2, h3 { font-weight: 600; line-height: 1.2; }
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; width: 100%; }

        /* Navbar */
        .navbar {
            padding: 1.25rem 2rem;
            background: rgba(5, 5, 5, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-link:hover { color: #fff; }

        /* Components */
        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-label {
            display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(0,0,0,0.5);
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem;
            padding: 1rem 2rem; border-radius: var(--radius-md);
            font-size: 1rem; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none; text-decoration: none;
        }
        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 10px 25px -5px var(--accent-glow);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 35px -5px var(--accent-glow);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* Utilities */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; }
        .text-secondary { color: var(--text-secondary); }
        .mt-4 { margin-top: 1rem; }
        .mt-8 { margin-top: 2rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }

        /* Alerts */
        .alert {
            padding: 1rem 1.25rem; border-radius: var(--radius-md); margin-bottom: 1.5rem;
            font-weight: 500; font-size: 0.9rem;
        }
        .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #6ee7b7; }

        /* Animations */
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table specific styles for dashboard */
        .table-wrapper {
            width: 100%; overflow-x: auto; border-radius: var(--radius-md);
            border: 1px solid var(--border-color); background: rgba(0,0,0,0.2);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1.25rem 1.5rem; text-align: left; }
        th { background: rgba(255,255,255,0.02); font-weight: 500; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); }
        td { border-bottom: 1px solid var(--border-color); color: #fff; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.03); }

        .badge {
            display: inline-flex; padding: 0.25rem 0.75rem; border-radius: 999px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .badge-verified { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-rejected { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>
    
    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="nav-brand">
            <span class="material-icons text-gradient" style="font-size: 1.8rem;">document_scanner</span>
            DocuLens AI
        </a>
        <div class="nav-links">
            <a href="{% url 'document_upload' %}" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                <span class="material-icons" style="font-size: 1.2rem;">add</span> Upload
            </a>
            <a href="{% url 'dashboard' %}" class="nav-link">History</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
