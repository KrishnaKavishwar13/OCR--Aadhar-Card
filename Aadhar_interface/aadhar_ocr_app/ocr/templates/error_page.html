{% extends "base.html" %}
{% block title %}Error - DocuLens AI{% endblock %}

{% block content %}
<div class="flex items-center justify-center w-full min-h-[70vh] animate-fade-up">
    <div class="glass-panel w-full text-center" style="max-width: 500px;">
        <span class="material-icons" style="font-size: 5rem; margin-bottom: 1rem; color: var(--danger-color);">error</span>
        <h2 class="mb-4">Oops! Something went wrong</h2>
        <p class="text-secondary mb-8">We encountered an error processing your request.</p>
        <a href="{% url 'dashboard' %}" class="btn btn-primary w-full">
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
